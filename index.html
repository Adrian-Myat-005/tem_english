<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tem English</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Top Right Profile -->
        <div id="user-profile-trigger" class="profile-trigger" style="display: none;">
            <img id="user-photo" src="" alt="Profile">
        </div>

        <!-- Profile Popup -->
        <div id="profile-popup" class="popup-overlay" style="display: none;">
            <div class="popup-content">
                <button class="close-popup" onclick="ui.togglePopup()">✕</button>
                <div class="popup-body">
                    <div class="edit-name-group">
                        <label for="edit-name">FULL NAME</label>
                        <input type="text" id="edit-name" placeholder="Enter name">
                        <button class="tactile-button small-button" onclick="auth.updateName()">UPDATE</button>
                    </div>
                    <div class="logout-group">
                        <button class="tactile-button" onclick="auth.logout()">LOGOUT</button>
                    </div>
                </div>
            </div>
        </div>

        <header>
            <h1>TEM ENGLISH</h1>
        </header>
        <main>
            <section id="auth-section">
                <div class="auth-box">
                    <h2>MEMBER ACCESS</h2>
                    <p class="hero-text">Join the community via Telegram.</p>
                    <!-- Telegram Login Widget Placeholder -->
                    <div id="telegram-login-container"></div>
                </div>
            </section>

            <section id="member-area" style="display: none;">
                <!-- Main page content left blank as requested -->
            </section>
        </main>
        <footer>
            <p>&copy; 2026 TEM ENGLISH</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
